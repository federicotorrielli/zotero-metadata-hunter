<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <style>
    .s { stroke: #3d3d3d; }
    @media (prefers-color-scheme: dark) { .s { stroke: #e0e0e0; } }
  </style>
  <!-- Magnifying glass -->
  <circle class="s" cx="6.5" cy="6.5" r="4" fill="none" stroke-width="1.5"/>
  <line class="s" x1="9.8" y1="9.8" x2="14" y2="14" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Plus sign -->
  <line class="s" x1="12.5" y1="1.5" x2="12.5" y2="5.5" stroke-width="1.4" stroke-linecap="round"/>
  <line class="s" x1="10.5" y1="3.5" x2="14.5" y2="3.5" stroke-width="1.4" stroke-linecap="round"/>
</svg>
