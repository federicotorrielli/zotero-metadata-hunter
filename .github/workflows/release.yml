name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      # Pnpm version is read from the "packageManager" field in package.json
      # so CI and local installs use the same toolchain (pnpm v11 turned the
      # ignored-builds warning into a hard error, which breaks frozen-lockfile
      # installs whose lockfile was generated by v10).
      - uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build XPI
        run: pnpm run build

      - name: Read version and addon ID
        id: meta
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          echo "addon_id=$(node -p "require('./package.json').config.addonID")" >> $GITHUB_OUTPUT

      # Use the tagged commit's full message (subject + body) as the release
      # body so the actual fix/feature explanation surfaces in the release,
      # not just the commit subject line that generate_release_notes lists.
      - name: Read commit message for release body
        id: notes
        run: |
          {
            echo 'body<<RELEASE_EOF'
            git log -1 --pretty=%B "${GITHUB_SHA}"
            echo 'RELEASE_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "v${{ steps.meta.outputs.version }}"
          body: ${{ steps.notes.outputs.body }}
          generate_release_notes: true
          files: build/${{ steps.meta.outputs.addon_id }}-${{ steps.meta.outputs.version }}.xpi

      - name: Update and push update.json on main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          # Switch to main BEFORE writing update.json — `checkout -f` discards any
          # working-tree changes, so writing the file first would wipe it silently.
          git checkout -f main

          VERSION="${{ steps.meta.outputs.version }}"
          ADDON_ID="${{ steps.meta.outputs.addon_id }}"
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          cat > update.json <<EOF
          {
            "addons": {
              "${ADDON_ID}": {
                "updates": [
                  {
                    "version": "${VERSION}",
                    "update_link": "https://github.com/${REPO}/releases/download/${TAG}/${ADDON_ID}-${VERSION}.xpi"
                  }
                ]
              }
            }
          }
          EOF

          git add update.json
          git diff --staged --quiet || git commit -m "chore: update update.json for ${{ github.ref_name }}"
          git push origin main
